{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix | Explore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff416c;
            --secondary: #ff4b2b;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            scroll-behavior: smooth;
        }

        /* NAVBAR - Glassmorphism */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1300px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #ccc;
            margin-left: 25px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* HERO SECTION */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.7), var(--bg)), url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 60px;
        }

        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero p { color: #bbb; margin-bottom: 30px; }

        /* SEARCH BOX */
        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass);
            background: var(--glass);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            background: rgba(255,255,255,0.2);
            border-color: var(--primary);
        }

        /* MOVIE GRID */
        .main-content {
            max-width: 1300px;
            margin: -50px auto 50px;
            padding: 0 20px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* CARD STYLING */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .card-info {
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .card-info h4 {
            margin: 0 0 10px;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* BUTTONS */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .icon-btn {
            background: var(--glass);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover { background: var(--primary); }
        .icon-btn.liked { color: var(--primary); background: white; }

        .btn-details {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* SUGGESTIONS */
        #suggestions {
            position: absolute;
            top: 60px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #suggestions p {
            padding: 12px 20px;
            margin: 0;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        #suggestions p:hover { background: #222; }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">MOVIEFLIX</a>
            <div class="nav-links">
                <a href="{% url 'recommendations' %}">Recommendations</a>
                <a href="{% url 'watchlist_page' %}">My Watchlist</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Unlimited Movies & More fun</h1>
        <p>Search for your favorites or explore our top picks.</p>
        
        <div class="search-box">
            <form method="GET" action="{% url 'home' %}">
                <input type="text" name="q" id="searchInput" placeholder="Search for a title..." autocomplete="off">
            </form>
            <div id="suggestions"></div>
        </div>
    </header>

    <main class="main-content">
        <div class="movies-grid">
            {% for movie in movies %}
            <div class="card">
                <img src="{{ movie.poster }}" alt="{{ movie.title }}">
                <div class="card-info">
                    <h4>{{ movie.title }}</h4>
                    <div class="btn-group">
                        <form action="{% url 'like_movie' movie.id %}" method="POST">
                            {% csrf_token %}
                            <button type="submit" class="icon-btn {% if movie.id in liked_movies %}liked{% endif %}">
                                {% if movie.id in liked_movies %}❤️{% else %}🤍{% endif %}
                            </button>
                        </form>

                        <form action="{% url 'toggle_watchlist' movie.id %}" method="POST">
                            {% csrf_token %}
                            <button type="submit" class="icon-btn">📌</button>
                        </form>

                        <button type="button" class="btn-details" onclick="window.location.href='{% url 'movie_detail' movie.id %}'">
                            Details
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        const input = document.getElementById("searchInput");
        const suggestions = document.getElementById("suggestions");

        input.addEventListener("keyup", async () => {
            let query = input.value;
            if(query.length < 2){ suggestions.innerHTML = ""; return; }
            let res = await fetch(`/suggest/?q=${query}`);
            let data = await res.json();
            suggestions.innerHTML = data.map(m => `<p onclick="selectMovie('${m}')">${m}</p>`).join("");
        });

        function selectMovie(name){
            input.value = name;
            suggestions.innerHTML = "";
            input.closest('form').submit();
        }
    </script>
</body>
</html>
