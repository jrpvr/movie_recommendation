{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix | {{ movie.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff416c;
            --secondary: #ff4b2b;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #ffd369;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* DYNAMIC BACKGROUND */
        .bg-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("{{ movie.poster }}") no-repeat center center/cover;
            filter: blur(60px) brightness(0.3);
            z-index: -1;
            transform: scale(1.1);
        }

        /* MAIN CONTAINER */
        .wrapper {
            max-width: 1100px;
            width: 90%;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        /* POSTER SECTION */
        .poster-box {
            flex: 1;
            min-width: 350px;
            position: relative;
        }

        .poster-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* INFO SECTION */
        .info-box {
            flex: 1.5;
            padding: 50px;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .back-link {
            text-decoration: none;
            color: #bbb;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--primary); }

        h1 {
            font-size: 3rem;
            margin: 0 0 15px;
            font-weight: 700;
            line-height: 1.1;
        }

        .meta {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #ddd;
        }

        .rating {
            color: var(--accent);
            font-weight: 600;
        }

        .badge {
            background: var(--glass);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .description {
            font-size: 16px;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* ACTION BUTTONS */
        .actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(255, 65, 108, 0.5);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: var(--glass);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.15);
        }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .info-box { padding: 30px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>

<body>

    <!-- Blurred Background -->
    <div class="bg-blur"></div>

    <div class="wrapper">
        <!-- Movie Poster -->
        <div class="poster-box">
            <img src="{{ movie.poster }}" alt="{{ movie.title }}" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'">
        </div>

        <!-- Movie Details -->
        <div class="info-box">
            <a href="javascript:history.back()" class="back-link">← Back to Explore</a>
            
            <h1>{{ movie.title }}</h1>
            
            <div class="meta">
                <span class="rating">⭐ {{ movie.rating }}/10</span>
                <span class="badge">{{ movie.year }}</span>
                <span class="badge">{{ movie.genre }}</span>
            </div>

            <p class="description">
                {{ movie.description }}
            </p>

            <div class="actions">
                <form action="{% url 'toggle_watchlist' movie.id %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary">
                        📌 Add to Watchlist
                    </button>
                </form>
                
                <form action="{% url 'like_movie' movie.id %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline">
                        ❤️ Like
                    </button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
