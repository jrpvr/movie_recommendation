{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix | {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff416c;
            --secondary: #ff4b2b;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #ffd369;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
        }

        /* SHARED NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass);
        }

        .nav-container {
            max-width: 1300px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a, .logout-btn {
            text-decoration: none;
            color: #ccc;
            margin-left: 25px;
            font-weight: 500;
            font-size: 15px;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .nav-links a:hover, .logout-btn:hover { color: var(--primary); }

        /* REUSABLE CARD STYLES */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
            padding: 40px 25px;
            max-width: 1300px;
            margin: auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass);
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .movie-card img { width: 100%; height: 360px; object-fit: cover; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">MOVIEFLIX</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'recommendations' %}">For You</a>
                <a href="{% url 'watchlist_page' %}">Watchlist</a>
                
                {% if user.is_authenticated %}
                    <form action="{% url 'logout' %}" method="post" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
