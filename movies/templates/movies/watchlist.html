{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix | My Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff416c;
            --secondary: #ff4b2b;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --glass: rgba(255, 255, 255, 0.08);
            --danger: #ff4b2b;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
        }

        /* NAVBAR - Matches Home/Recommend */
        .navbar {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass);
        }

        .nav-container {
            max-width: 1300px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #ccc;
            margin-left: 25px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--primary); }

        /* HEADER */
        .header-section {
            text-align: center;
            padding: 60px 20px 40px;
            background: radial-gradient(circle at top, rgba(255, 65, 108, 0.1), transparent);
        }

        .header-section h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
        }

        .header-section p {
            color: #888;
            margin-top: 10px;
        }

        /* GRID */
        .container {
            max-width: 1300px;
            margin: auto;
            padding: 0 25px 50px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        /* CARD */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .card img {
            width: 100%;
            height: 360px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            background: linear-gradient(to top, #161616 85%, transparent);
            text-align: center;
        }

        .card-content h3 {
            margin: 0 0 15px;
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* BUTTONS */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .btn-details {
            background: var(--primary);
            color: white;
        }

        .btn-details:hover {
            background: var(--secondary);
            transform: scale(1.03);
        }

        .btn-remove {
            background: var(--glass);
            color: #ffb7b7;
            font-size: 12px;
        }

        .btn-remove:hover {
            background: rgba(255, 75, 43, 0.2);
            color: var(--danger);
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
        }

        .empty-state p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 25px;
        }

        .browse-link {
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .browse-link:hover {
            box-shadow: 0 0 20px rgba(255, 65, 108, 0.4);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">MOVIEFLIX</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'recommendations' %}">Recommendations</a>
            </div>
        </div>
    </nav>

    <header class="header-section">
        <h1>❤️ My Watchlist</h1>
        <p>Movies you've saved to watch later.</p>
    </header>

    <main class="container">
        <div class="movies-grid">
            {% for movie in movies %}
            <div class="card">
                <img src="{{ movie.poster }}" alt="{{ movie.title }}" 
                     onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                
                <div class="card-content">
                    <h3>{{ movie.title }}</h3>
                    
                    <div class="btn-group">
                        <a href="{% url 'movie_detail' movie.id %}" class="btn btn-details">
                            🎬 View Details
                        </a>
                        
                        <!-- Toggle Watchlist (Remove) -->
                        <form action="{% url 'toggle_watchlist' movie.id %}" method="POST" style="margin:0;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-remove" style="width: 100%;">
                                ❌ Remove from List
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="empty-state">
                <p>Your watchlist is feeling a little lonely... 😢</p>
                <a href="{% url 'home' %}" class="browse-link">Find Some Movies</a>
            </div>
            {% endfor %}
        </div>
    </main>

</body>
</html>
