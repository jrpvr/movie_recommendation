<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 Login</h2>

    <form method="post">
        {% csrf_token %}

        <!-- 🔥 IMPORTANT (fix redirect) -->
        <input type="hidden" name="next" value="{{ next }}">

        <input type="text" name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br>

        <button type="submit">Login</button>
    </form>

    {% if form.errors %}
        <p style="color:red;">Invalid username or password</p>
    {% endif %}
</div>

</body>
</html>
